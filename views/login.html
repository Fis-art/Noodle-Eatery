<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin - SMD</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 20px;
    }
    .login-container {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .login-logo .logo-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #e94560, #ff6b6b);
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      box-shadow: 0 10px 30px rgba(233, 69, 96, 0.3);
    }
    .login-logo .logo-icon i {
      font-size: 32px;
      color: white;
    }
    .login-logo h1 {
      color: white;
      font-size: 24px;
      font-weight: 700;
      margin: 0;
    }
    .login-logo p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      margin-top: 8px;
    }
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .form-group {
      position: relative;
    }
    .form-group label {
      display: block;
      color: rgba(255, 255, 255, 0.8);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
    }
    .form-group .input-icon {
      position: absolute;
      left: 16px;
      top: 42px;
      color: rgba(255, 255, 255, 0.4);
      font-size: 16px;
    }
    .form-group input {
      width: 100%;
      padding: 14px 16px 14px 48px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: white;
      font-size: 15px;
      transition: all 0.3s ease;
      font-family: 'Poppins', sans-serif;
    }
    .form-group input:focus {
      outline: none;
      border-color: #e94560;
      background: rgba(233, 69, 96, 0.05);
      box-shadow: 0 0 0 4px rgba(233, 69, 96, 0.1);
    }
    .form-group input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }
    .login-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #e94560, #ff6b6b);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-family: 'Poppins', sans-serif;
    }
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
    }
    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }
    .login-error {
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid rgba(255, 107, 107, 0.3);
      border-radius: 10px;
      padding: 12px 16px;
      color: #ff6b6b;
      font-size: 13px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .login-error.show {
      display: flex;
    }
    .login-footer {
      text-align: center;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    .login-footer a {
      color: rgba(255, 255, 255, 0.6);
      text-decoration: none;
      font-size: 13px;
      transition: color 0.3s;
    }
    .login-footer a:hover {
      color: #e94560;
    }
  </style>
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-logo">
      <div class="logo-icon">
        <i class="fas fa-user-shield"></i>
      </div>
      <h1>Admin Panel</h1>
      <p>Bakso & Mie Ayam SMD</p>
    </div>

    <div class="login-error" id="loginError">
      <i class="fas fa-exclamation-circle"></i>
      <span id="errorMessage">Username atau password salah</span>
    </div>

    <form class="login-form" id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <i class="fas fa-user input-icon"></i>
        <input type="text" id="username" placeholder="Masukkan username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <i class="fas fa-lock input-icon"></i>
        <input type="password" id="password" placeholder="Masukkan password" required>
      </div>
      <button type="submit" class="login-btn" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i>
        <span>Masuk</span>
      </button>
    </form>

    <div class="login-footer">
      <a href="/"><i class="fas fa-arrow-left"></i> Kembali ke Beranda</a>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('loginBtn');
      const loginError = document.getElementById('loginError');
      
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>Memproses...</span>';
      
      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (data.success) {
          window.location.href = data.redirect;
        } else {
          loginError.classList.add('show');
          document.getElementById('errorMessage').textContent = data.message;
        }
      } catch (error) {
        loginError.classList.add('show');
        document.getElementById('errorMessage').textContent = 'Terjadi kesalahan, coba lagi';
      }
      
      loginBtn.disabled = false;
      loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> <span>Masuk</span>';
    });
  </script>
</body>
</html>
